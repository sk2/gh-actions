name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        required: false
        type: string
        default: "3.11"
      install-command:
        description: Command to install dependencies
        required: false
        type: string
        default: "python -m pip install -U pip pytest"
      test-command:
        description: Command to run tests
        required: false
        type: string
        default: "python -m pytest -q"

    secrets:
      GH_TOKEN:
        description: Optional token if checkout needs it
        required: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install
        run: ${{ inputs.install-command }}

      - name: Test
        run: ${{ inputs.test-command }}
